# Snippet: add the cronmanager-mcp service to your existing cronmanager docker-compose.yml
#
# The MCP server must be able to reach the Cronmanager web container.
# Add it to the same Docker network (replace "cronmanager-net" with your network name).

services:
  cronmanager-mcp:
    image: cs1711/cronmanager-mcp:latest
    container_name: cronmanager-mcp
    restart: unless-stopped
    environment:
      # URL of the Cronmanager web container (internal Docker network address or external URL)
      CM_BASE_URL: https://cronmanager.example.com
      # API key generated in the Cronmanager web UI (API Keys section)
      # Recommended scopes: jobs:read, jobs:write, jobs:execute, export:read,
      #                      maintenance:read, maintenance:write, settings:read
      CM_API_KEY: cm_your_api_key_here
      # Bearer token to protect this MCP endpoint
      MCP_AUTH_TOKEN: your_mcp_auth_token_here
      # Restrict to read-only tools (optional, default false)
      # MCP_READONLY_MODE: "false"
      # Target a specific agent in a multi-agent setup (optional)
      # CM_AGENT_ID: "1"
    ports:
      - "3000:3000"
    networks:
      - cronmanager-net

# Ensure the network is declared in the networks section of your main compose file:
# networks:
#   cronmanager-net:
#     external: true
